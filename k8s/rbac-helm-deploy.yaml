# RBAC requis pour déployer l'opérateur via Helm
#
# À appliquer une fois par cluster avec un compte admin :
#   kubectl apply -f k8s/rbac-helm-deploy.yaml
#
# Remplacer <USER> par le nom d'utilisateur Kubernetes du déployeur,
# par exemple : scaleway:bearer:178e3688-8b7f-4d0a-aa3c-dd99f8d5e7ef
#
# Pourquoi ces permissions ?
# - Helm stocke son état de release comme des Secrets dans le namespace cible.
#   deploy-crds et deploy ont besoin de lire/écrire ces secrets dans scaleway-system.
# - Les CRDs sont des ressources cluster-scoped : leur création/mise à jour
#   requiert un ClusterRole sur apiextensions.k8s.io.

---
# Permissions cluster pour gérer les CRDs (ressources cluster-scoped)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: scaleway-operator-helm-deploy
  labels:
    app.kubernetes.io/part-of: scaleway-operator
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: scaleway-operator-helm-deploy
  labels:
    app.kubernetes.io/part-of: scaleway-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: scaleway-operator-helm-deploy
subjects:
  - kind: User
    name: <USER>
    apiGroup: rbac.authorization.k8s.io

---
# Namespace scaleway-system (doit exister avant d'appliquer le Role ci-dessous)
apiVersion: v1
kind: Namespace
metadata:
  name: scaleway-system
  labels:
    app.kubernetes.io/part-of: scaleway-operator

---
# Permissions namespace pour l'état Helm (secrets de release)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scaleway-operator-helm-deploy
  namespace: scaleway-system
  labels:
    app.kubernetes.io/part-of: scaleway-operator
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scaleway-operator-helm-deploy
  namespace: scaleway-system
  labels:
    app.kubernetes.io/part-of: scaleway-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scaleway-operator-helm-deploy
subjects:
  - kind: User
    name: <USER>
    apiGroup: rbac.authorization.k8s.io

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: instances.scaleway.io
  labels:
    io.scaleway.k8s.crd.schema.version: 0.1.0
spec:
  group: scaleway.io
  names:
    categories: []
    kind: Instance
    plural: instances
    shortNames: []
    singular: instance
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.scalewayId
      name: Scaleway ID
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.publicIp
      name: IP
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for InstanceSpec via `CustomResource`
        properties:
          spec:
            properties:
              boot_volume_size:
                default: 20
                description: 'Boot volume size en GB (optionnel, défaut: 20)'
                format: int32
                type: integer
              image:
                description: Image à utiliser (ubuntu-jammy, debian-12, etc.)
                type: string
              instance_type:
                description: Type commercial (DEV1-S, GP1-M, GPU-3090, etc.)
                type: string
              name:
                description: Nom de l'instance Scaleway
                type: string
              network:
                description: Configuration réseau optionnelle
                nullable: true
                properties:
                  enable_ipv6:
                    nullable: true
                    type: boolean
                  public_ip:
                    nullable: true
                    type: boolean
                type: object
              security:
                description: Configuration de sécurité optionnelle
                nullable: true
                properties:
                  enable_firewall:
                    nullable: true
                    type: boolean
                type: object
              tags:
                default: []
                description: Tags optionnels
                items:
                  type: string
                type: array
              zone:
                description: Zone Scaleway (fr-par-1, nl-ams-1, etc.)
                type: string
            required:
            - image
            - instance_type
            - name
            - zone
            type: object
          status:
            nullable: true
            properties:
              created_at:
                description: Timestamp de création
                format: date-time
                nullable: true
                type: string
              error_message:
                description: Message d'erreur si applicable
                nullable: true
                type: string
              project_id:
                description: ID du projet Scaleway (pour tracking)
                nullable: true
                type: string
              public_ip:
                description: IP publique
                nullable: true
                type: string
              scaleway_id:
                description: ID Scaleway de l'instance
                nullable: true
                type: string
              state:
                default: ''
                description: État actuel (running, stopped, booted, starting, stopping, rebooting, etc.)
                type: string
              sync_state:
                default: ''
                description: État de la synchronisation (Synced, Syncing, Error)
                type: string
            type: object
        required:
        - spec
        title: Instance
        type: object
    served: true
    storage: true
    subresources:
      status: {}

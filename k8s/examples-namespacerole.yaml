---
# Exemple 1: Assigner le rôle Editor au namespace production
# Convention: le nom du NamespaceRole doit être le même que le namespace
apiVersion: scaleway.mathieubodin.io/v1
kind: NamespaceRole
metadata:
  name: production  # Doit correspondre au namespace "production"
spec:
  namespace: production
  scaleway_role: Editor  # L'opérateur assumera ce rôle pour les ressources de ce namespace
  description: "Production namespace - Editor role for operators"

---
# Exemple 2: Assigner le rôle Viewer au namespace development (lecture seule)
apiVersion: scaleway.mathieubodin.io/v1
kind: NamespaceRole
metadata:
  name: development
spec:
  namespace: development
  scaleway_role: Viewer  # Lecture seule - ne peut pas créer/modifier/supprimer
  description: "Development namespace - Viewer role (read-only)"

---
# Exemple 3: Assigner le rôle Admin au namespace admin
apiVersion: scaleway.mathieubodin.io/v1
kind: NamespaceRole
metadata:
  name: admin
spec:
  namespace: admin
  scaleway_role: Admin  # Accès complet
  description: "Admin namespace - Full access"

---
# Exemple 4: Assigner le rôle SecurityResponsible au namespace security
apiVersion: scaleway.mathieubodin.io/v1
kind: NamespaceRole
metadata:
  name: security
spec:
  namespace: security
  scaleway_role: SecurityResponsible
  description: "Security namespace - Security responsibility role"

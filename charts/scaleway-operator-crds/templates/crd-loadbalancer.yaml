# Note: CRD définie mais non réconciliée par l'opérateur en v0.1
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: loadbalancers.scaleway.io
  annotations:
    helm.sh/resource-policy: keep
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
  labels:
    io.scaleway.k8s.crd.schema.version: {{ .Chart.AppVersion }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  group: scaleway.io
  names:
    categories: []
    kind: LoadBalancer
    plural: loadbalancers
    shortNames: []
    singular: loadbalancer
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for LoadBalancerSpec via `CustomResource`
        properties:
          spec:
            properties:
              backends:
                description: Configuration backend
                items:
                  properties:
                    name:
                      type: string
                    port:
                      format: int32
                      type: integer
                    protocol:
                      type: string
                  required:
                  - name
                  - port
                  - protocol
                  type: object
                type: array
              lb_type:
                description: Type (lb-s, lb-gp-m, etc.)
                type: string
              name:
                description: Nom du Load Balancer
                type: string
              project_id:
                description: ID du projet
                type: string
              zone:
                description: Zone Scaleway
                type: string
            required:
            - backends
            - lb_type
            - name
            - project_id
            - zone
            type: object
          status:
            nullable: true
            properties:
              ip_address:
                nullable: true
                type: string
              scaleway_id:
                nullable: true
                type: string
              state:
                default: ''
                type: string
            type: object
        required:
        - spec
        title: LoadBalancer
        type: object
    served: true
    storage: true
    subresources:
      status: {}

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: projects.scaleway.io
  annotations:
    helm.sh/resource-policy: keep
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
  labels:
    io.scaleway.k8s.crd.schema.version: {{ .Chart.AppVersion }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  group: scaleway.io
  names:
    categories: []
    kind: Project
    plural: projects
    shortNames: []
    singular: project
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for ProjectSpec via `CustomResource`
        properties:
          spec:
            properties:
              description:
                description: Description optionnelle
                nullable: true
                type: string
              name:
                description: Nom du projet Scaleway
                type: string
              organization_id:
                description: ID de l'organisation
                type: string
            required:
            - name
            - organization_id
            type: object
          status:
            nullable: true
            properties:
              created_at:
                description: Timestamp de création
                format: date-time
                nullable: true
                type: string
              scaleway_project_id:
                description: ID Scaleway du projet
                nullable: true
                type: string
              sync_state:
                default: ''
                description: État de synchronisation
                type: string
            type: object
        required:
        - spec
        title: Project
        type: object
    served: true
    storage: true
    subresources:
      status: {}

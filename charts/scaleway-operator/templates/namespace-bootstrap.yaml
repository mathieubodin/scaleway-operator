{{- if .Values.namespaceBootstrap.enabled }}
{{- range .Values.namespaceBootstrap.namespaces }}
---
# NamespaceRole cluster-wide pour le namespace {{ .name }}
# helm.sh/resource-policy: keep protège cette ressource lors d'un helm uninstall
apiVersion: scaleway.mathieubodin.io/v1
kind: NamespaceRole
metadata:
  name: {{ .name }}
  labels:
    {{- include "scaleway-operator.labels" $ | nindent 4 }}
    app.kubernetes.io/component: namespace-bootstrap
  annotations:
    helm.sh/resource-policy: keep
spec:
  namespace: {{ .name }}
  scaleway_role: Editor
---
# Annotation scaleway.mathieubodin.io/project-id sur le namespace {{ .name }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .name }}
  annotations:
    scaleway.mathieubodin.io/project-id: {{ required (printf "namespaceBootstrap.namespaces[].projectId is required for namespace '%s'" .name) .projectId | quote }}
{{- end }}
{{- end }}

name: Auto-add to Roadmap Project

on:
  issues:
    types: [opened, reopened]

# Requiert le secret GH_PROJECT_TOKEN — un fine-grained PAT avec:
#   - Repository access: scaleway-operator
#   - Repository permissions: Issues (Read)
#   - User permissions: Projects (Read and write)
# Le GITHUB_TOKEN natif ne peut pas écrire dans un Project v2 user-owned.

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Add issue to Project v2 #2
        uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd  # v2.0.0
        with:
          project-url: https://github.com/users/mathieubodin/projects/2
          github-token: ${{ secrets.GH_PROJECT_TOKEN }}

name: Release

on:
  push:
    branches:
      - main

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Release Please
  # Crée et maintient une "Release PR" basée sur les commits conventionnels.
  # Quand la PR est mergée : crée un tag Git sémantique + une GitHub Release.
  # ────────────────────────────────────────────────────────────────────────────
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
      version:         ${{ steps.release.outputs.version }}
      sha:             ${{ steps.release.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        id: release
        with:
          token:         ${{ secrets.GITHUB_TOKEN }}
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Tests d'intégration via kind (gate de release)
  # Tourne sur chaque push main. build-and-push dépend de ce job.
  # ────────────────────────────────────────────────────────────────────────────
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install kind
        run: |
          curl -sSLo /usr/local/bin/kind \
            "https://github.com/kubernetes-sigs/kind/releases/download/v0.31.0/kind-linux-amd64"
          chmod +x /usr/local/bin/kind

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-integration-

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0

      - name: Run integration tests
        run: make test-integration-kind

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Build multi-arch + push GHCR + cosign signing
  # Déclenché UNIQUEMENT quand release-please a créé une release ET les tests
  # d'intégration sont verts.
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    needs: [release-please, integration-tests]
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.integration-tests.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      # Buildx requis pour --platform multi-arch
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      # Login GHCR via GITHUB_TOKEN (OIDC natif, zéro secret à gérer)
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Génération des tags OCI : semver (vX.Y.Z, vX.Y, vX), latest, sha court
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.version }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=scaleway-operator
            org.opencontainers.image.description=Kubernetes operator for Scaleway resources
            org.opencontainers.image.vendor=Scaleway

      # Build multi-arch + push GHCR
      # cargo-chef + cargo-zigbuild dans le Dockerfile :
      #   linux/amd64 → x86_64-unknown-linux-musl (natif sur runner CI)
      #   linux/arm64 → aarch64-unknown-linux-musl (cross-compilé, pas de QEMU)
      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # Cosign keyless signing (Fulcio/Rekor, OIDC GHA, zéro gestion de clé)
      # La signature est attachée au digest immuable, pas au tag mutable
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          cosign-release: v2.5.2

      - name: Sign image
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS:   ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          while IFS= read -r tag; do
            images+="${tag}@${DIGEST} "
          done <<< "${TAGS}"
          cosign sign --yes ${images}

      # Attestation de provenance SLSA Level 2 (GitHub-natif)
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name:   ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

      # Publication des Helm charts en OCI sur GHCR
      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0

      - name: Log in to GHCR Helm registry
        run: |
          helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }}

      - name: Create chart output directory
        run: mkdir -p target/charts

      - name: Package and push scaleway-operator-crds chart
        run: |
          CHART_VERSION=$(grep '^version:' charts/scaleway-operator-crds/Chart.yaml | awk '{print $2}')
          if [ -z "$CHART_VERSION" ]; then
            echo "ERROR: Could not determine chart version from charts/scaleway-operator-crds/Chart.yaml" >&2
            exit 1
          fi
          helm package charts/scaleway-operator-crds --destination target/charts/
          for attempt in 1 2 3; do
            helm push "target/charts/scaleway-operator-crds-${CHART_VERSION}.tgz" \
              oci://ghcr.io/${{ github.repository_owner }}/charts && break
            [ "$attempt" -lt 3 ] && echo "Push attempt $attempt failed, retrying…" && sleep 10
          done

      - name: Package and push scaleway-operator chart
        run: |
          CHART_VERSION=$(grep '^version:' charts/scaleway-operator/Chart.yaml | awk '{print $2}')
          if [ -z "$CHART_VERSION" ]; then
            echo "ERROR: Could not determine chart version from charts/scaleway-operator/Chart.yaml" >&2
            exit 1
          fi
          helm package charts/scaleway-operator --destination target/charts/
          for attempt in 1 2 3; do
            helm push "target/charts/scaleway-operator-${CHART_VERSION}.tgz" \
              oci://ghcr.io/${{ github.repository_owner }}/charts && break
            [ "$attempt" -lt 3 ] && echo "Push attempt $attempt failed, retrying…" && sleep 10
          done

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4: Sync README helm versions
  # Met à jour --version X.Y.Z dans README.md après chaque release de chart.
  # Push via GITHUB_TOKEN : GitHub ne re-déclenche pas de workflow run pour les
  # push effectués avec ce token (suppression plateforme, pas de boucle CI).
  # Précondition : github-actions[bot] doit pouvoir pousser sur main directement.
  # ────────────────────────────────────────────────────────────────────────────
  sync-readme-versions:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read and validate chart versions
        id: chart-version
        run: |
          CRD_VER=$(grep '^version:' charts/scaleway-operator-crds/Chart.yaml | awk '{print $2}')
          OP_VER=$(grep '^version:' charts/scaleway-operator/Chart.yaml | awk '{print $2}')
          [[ "$CRD_VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "ERROR: invalid crds version: $CRD_VER" >&2; exit 1; }
          [[ "$OP_VER"  =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "ERROR: invalid operator version: $OP_VER"  >&2; exit 1; }
          echo "crds=$CRD_VER"     >> "$GITHUB_OUTPUT"
          echo "operator=$OP_VER"  >> "$GITHUB_OUTPUT"

      - name: Update README helm versions
        run: |
          sed -i '/ghcr\.io\/mathieubodin\/charts\/scaleway-operator-crds/{n;s/--version [0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/--version ${{ steps.chart-version.outputs.crds }}/}' README.md
          sed -i '/ghcr\.io\/mathieubodin\/charts\/scaleway-operator[^-]/{n;s/--version [0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/--version ${{ steps.chart-version.outputs.operator }}/}' README.md

      - name: Commit if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "chore: sync README helm versions (crds=${{ steps.chart-version.outputs.crds }}, operator=${{ steps.chart-version.outputs.operator }})" &&
            git push
          )

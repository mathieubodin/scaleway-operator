name: Release

on:
  push:
    branches:
      - main

# Permissions nécessaires pour Release Please, GHCR, cosign OIDC
permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Release Please
  # Crée et maintient une "Release PR" basée sur les commits conventionnels.
  # Quand la PR est mergée : crée un tag Git sémantique + une GitHub Release.
  # ────────────────────────────────────────────────────────────────────────────
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
      version:         ${{ steps.release.outputs.version }}
      sha:             ${{ steps.release.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token:         ${{ secrets.GITHUB_TOKEN }}
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Build multi-arch + push GHCR + cosign signing
  # Déclenché UNIQUEMENT quand release-please a créé une release.
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      # Buildx requis pour --platform multi-arch
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login GHCR via GITHUB_TOKEN (OIDC natif, zéro secret à gérer)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Génération des tags OCI : semver (vX.Y.Z, vX.Y, vX), latest, sha court
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.tag_name }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=scaleway-operator
            org.opencontainers.image.description=Kubernetes operator for Scaleway resources
            org.opencontainers.image.vendor=Scaleway

      # Build multi-arch + push GHCR
      # cargo-chef + cargo-zigbuild dans le Dockerfile :
      #   linux/amd64 → x86_64-unknown-linux-musl (natif sur runner CI)
      #   linux/arm64 → aarch64-unknown-linux-musl (cross-compilé, pas de QEMU)
      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            VERSION=${{ needs.release-please.outputs.version }}

      # Cosign keyless signing (Fulcio/Rekor, OIDC GHA, zéro gestion de clé)
      # La signature est attachée au digest immuable, pas au tag mutable
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS:   ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      # Attestation de provenance SLSA Level 2 (GitHub-natif)
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name:   ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true
